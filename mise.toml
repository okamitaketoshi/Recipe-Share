# mise configuration
# https://mise.jdx.dev/configuration.html

[tasks."pre-commit:check"]
description = "コミット前チェック: TypeScript型チェック、ESLint、Prettier、機密情報チェック"
run = """
set -e

echo "🚀 pre-commitチェック開始..."
echo ""

# 1. TypeScript型チェック
echo "📝 [1/4] TypeScript型チェック..."
npm run typecheck
echo "✅ TypeScript型チェック完了"
echo ""

# 2. ESLint自動修正 + チェック
echo "🔍 [2/4] ESLint自動修正 + チェック..."
npm run lint -- --fix
echo "✅ ESLint完了"
echo ""

# 3. Prettier自動整形 + チェック
echo "💅 [3/4] Prettier自動整形..."
npm run format
echo "✅ Prettier完了"
echo ""

# 4. 機密情報チェック
echo "🔒 [4/4] 機密情報チェック..."
./scripts/check-secrets.sh
echo ""

echo "✨ すべてのチェックが完了しました！"
"""

[tasks."pre-commit:check:quick"]
description = "高速版: TypeScript型チェックとESLintのみ"
run = """
set -e
echo "⚡ 高速チェック開始..."
npm run typecheck && npm run lint
echo "✅ 高速チェック完了"
"""

[tasks."db:start"]
description = "ローカルSupabase環境起動"
run = "npx supabase start"

[tasks."db:stop"]
description = "ローカルSupabase環境停止"
run = "npx supabase stop"

[tasks."db:status"]
description = "ローカルSupabase環境の状態確認"
run = "npx supabase status"

[tasks."db:reset"]
description = "ローカルDBリセット（データ削除 + マイグレーション再適用）"
run = "npx supabase db reset"

[tasks."db:psql"]
description = "ローカルDBに接続（psqlシェル起動）"
run = "psql 'postgresql://postgres:postgres@127.0.0.1:54322/postgres'"

[tasks."db:studio"]
description = "Supabase Studio起動（ブラウザベースのDB管理UI）"
run = "open http://localhost:54323"

[tasks."db:seed"]
description = "シードデータを投入（seed.sqlを実行）"
run = "psql 'postgresql://postgres:postgres@127.0.0.1:54322/postgres' -f supabase/seed.sql"

[tasks."supabase:trigger-preview"]
description = "Supabase Preview環境トリガー（.preview-triggerにタイムスタンプを追記）"
run = """
set -e
echo "🔄 Supabase Preview環境トリガー用ファイルを更新..."
echo "" >> supabase/.preview-trigger
echo "Updated at: $(date '+%Y-%m-%d %H:%M:%S')" >> supabase/.preview-trigger
git add supabase/.preview-trigger
echo "✅ supabase/.preview-trigger を更新しました"
"""
